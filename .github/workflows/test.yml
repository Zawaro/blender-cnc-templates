name: Test

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --group lint
      - name: Ruff check
        run: uv run ruff check .
      - name: Run tests
        run: uv run pytest tests/ -v

  bpy-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blender-version: ["5.1.2", "4.3.2", "3.6.23", "2.93.18"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Blender
        run: |
          pip install blender-downloader
          blender-downloader ${{ matrix.blender-version }} -d ./blender -e
          echo "BLENDERExecutable=./blender/blender" >> $GITHUB_ENV
      - name: Install pytest in Blender Python
        run: |
          BLENDER_PYTHON=$(./blender/blender -b --python-expr "import sys; print(sys.executable)" 2>/dev/null | head -1)
          $BLENDER_PYTHON -m pip install pytest
      - name: Install dependencies
        run: uv sync --group test
      - name: Run all tests with Blender
        run: uv run pytest -p pytest-blender --blender-executable ${{ env.BLENDERExecutable }} tests/ -v
